<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Epic Transfer - Formulário</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Menu padrão -->
  <header>
    <nav id="main-menu">
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="form.html">Formulário</a></li>
        <li><a href="about.html">Sobre</a></li>
      </ul>
    </nav>
    <div class="overlay">
      <h1>Formulário de Contato</h1>
      <p>Entre em contato conosco!</p>
    </div>
  </header>

  <!-- Conteúdo principal -->
  <div class="container">
    <section id="form-section">
      <h2>Preencha o Formulário</h2>
      <!-- A ação direciona para formAction.html usando o método GET -->
      <form id="userForm" action="formAction.html" method="GET" onsubmit="return validarFormulario()">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
        
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" 
               required>
        
        <label for="phone">Telefone</label>
        <input type="tel" id="phone" name="phone" placeholder="+55 11 91234-5678" required>
        
        <button type="submit">Enviar</button>
      </form>
    </section>
  </div>

  </footer>

  <script src="js/script.js"></script>
</body>
</html>
